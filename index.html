<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>

    <!-- メモ：スタイルが競合した場合は、style.cssが採用される -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column justify-content-center align-items-center vh-100">
    <header class="header text-center mb-4">
        <h1 class="title mb-5">Tetris</h1>
        <div class="score fw-semibold mb-2">Score: <span id="score">0</span></div>
        <div class="button-area">
                <!-- 
                ボタン動作の仕様：
                ・「開始」ボタンを押すとゲームがスタートし、「中断」ボタンに切り替わる
                ・「中断」ボタンを押すとゲームが一時停止し、「再開」ボタンに切り替わる
                ・「リセット」ボタンを押すとゲームを最初の状態に戻す
                -->
            <button class="btn btn-success" id="start-button">開始</button>
            <button class="btn btn-warning d-none" id="pause-button">中断</button>
            <button class="btn btn-primary d-none" id="restart-button">再開</button>
            <button class="btn btn-danger d-none" id="reset-button">リセット</button>
        </div>
    </header>

    <main class="main d-flex justify-content-center align-items-stretch gap-5">
        <section class="game-area d-flex gap-3 flex-column justify-content-center">
            <!-- メインエリア -->
            <canvas id="main-canvas"  width="300" height="600" class="border">
            </canvas>

            <!-- 移動ボタン -->
            <div class="d-flex gap-3 justify-content-center">
                <button class="btn btn-secondary" id="move-left">← 左</button>
                <button class="btn btn-secondary" id="move-down">↓ 下</button>
                <button class="btn btn-secondary" id="move-right">→ 右</button>
                <button class="btn btn-secondary" id="rotate">⟳ 回転</button>
            </div>
        </section>

            <!-- NEXTエリア -->
            <div class="d-flex flex-column justify-content-center">
                <canvas id="next-canvas" width="180" height="120" class="border">
                </canvas>
            </div>
    </main>
    <script src="js/board.js" defer></script>
    <script src="js/tetromino.js" defer></script>
    <script src="js/main.js" defer></script>
</body>
</html>
